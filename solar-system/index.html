<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系运转模型</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="info">
        <h2>太阳系模型</h2>
        <p>左键拖动旋转视角</p>
        <p>右键拖动平移视角</p>
        <p>单指旋转 / 双指平移</p>
        <p>滚轮缩放</p>
        <p>使用控制面板调整速度</p>
        <p>悬停查看行星和卫星信息</p>
        <p style="margin-top:12px; font-size:11px; opacity:0.8; line-height:1.5; padding:8px; background:rgba(59,130,246,0.1); border-radius:8px;">
            地球: 1 | 火星: 2<br>
            木星: 79 | 土星: 82<br>
            天王星: 27 | 海王星: 14<br>
            <strong>共205颗卫星</strong>
        </p>
    </div>

    <div id="speed-control">
        <label for="speed">运转速度: <span id="speed-value">1x</span></label>
        <input type="range" id="speed" min="0" max="5" step="0.1" value="1">
    </div>

    <div id="time-display">
        <h3>模拟时间</h3>
        <div class="time-item">
            <span class="time-label">地球年:</span>
            <span class="time-value" id="earth-years">0</span>
        </div>
        <div class="time-item">
            <span class="time-label">地球日:</span>
            <span class="time-value" id="earth-days">0</span>
        </div>
        <div class="time-date" id="simulation-date">
            开始日期: 2026年1月1日
        </div>
    </div>

    <div id="controls">
        <button id="pause-btn">暂停</button>
        <button id="reset-btn">重置视角</button>
        <button id="toggle-orbits">隐藏轨道</button>
        <button id="toggle-small-moons">隐藏小卫星</button>
    </div>

    <div id="tooltip">
        <h3 id="tooltip-name"></h3>
        <p id="tooltip-info"></p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/texture-manager.js"></script>
    <script src="js/data.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/planets.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
