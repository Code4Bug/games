<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 迷宫探险</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>
        </div>
    </div>
    
    <div class="game-container">
        <!-- 左侧游戏棋盘区域 -->
        <div class="game-board-section">
            <div class="game-header">
                <div class="game-title">
                    <h1>🎯 迷宫探险</h1>
                    <p class="subtitle">挑战你的智慧与耐心</p>
                </div>
                
                <div class="game-info-board">
                    <div class="stats-section">
                        <div class="stat-item">
                            <span class="stat-icon">👣</span>
                            <div class="stat-content">
                                <span class="stat-label">步数</span>
                                <span id="stepCount" class="stat-value">0</span>
                            </div>
                        </div>
                        <div class="stat-item">
                            <span class="stat-icon">⏱️</span>
                            <div class="stat-content">
                                <span class="stat-label">时间</span>
                                <span id="timeCount" class="stat-value">00:00</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="control-section">
                        <div class="instruction-text">⌨️ 方向键移动</div>
                        <button id="newGameBtn" class="compact-button">
                            <span class="btn-icon">🎲</span>
                            <span>新游戏</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="maze-board">
                <div class="maze-legends">
                    <div class="legend-item player-legend">
                        <div class="legend-icon player-icon"></div>
                        <span>起点</span>
                    </div>
                    <div class="legend-item exit-legend">
                        <div class="legend-icon exit-icon"></div>
                        <span>终点</span>
                    </div>
                </div>
                <canvas id="mazeCanvas" width="600" height="600"></canvas>
            </div>
            
            <div class="game-status">
                <div id="gameMessage" class="game-result hidden">
                    <span id="result-text"></span>
                </div>
            </div>
        </div>

        <!-- 右侧设置和信息区域 -->
        <div class="settings-section">
            <div class="control-panel">
                <h2>游戏控制</h2>
                <div class="instruction-card">
                    <div class="icon">🎮</div>
                    <p>使用方向键控制移动</p>
                </div>
                <div class="button-group">
                    <button id="solveMazeBtn" class="btn btn-secondary">
                        <span class="btn-icon">💡</span>
                        显示路径
                    </button>
                    <button id="hideSolutionBtn" class="btn btn-tertiary hidden">
                        <span class="btn-icon">🚫</span>
                        隐藏路径
                    </button>
                </div>
            </div>

            <!-- 难度设置 -->
            <div class="difficulty-panel">
                <h2>难度设置</h2>
                <div class="difficulty-selection">
                    <div class="difficulty-options">
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="easy" checked>
                            <span>简单 (15×15)</span>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="normal">
                            <span>普通 (25×25)</span>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="hard">
                            <span>困难 (35×35)</span>
                        </label>
                        <label class="difficulty-option">
                            <input type="radio" name="difficulty" value="custom">
                            <span>自定义</span>
                        </label>
                    </div>
                </div>

                <!-- 自定义难度设置 -->
                <div id="custom-settings" class="custom-settings hidden">
                    <h4>自定义设置</h4>
                    <div class="custom-input-group">
                        <label for="custom-size">迷宫大小 (10-50):</label>
                        <input type="number" id="custom-size" min="10" max="50" value="25">
                    </div>
                    <div class="custom-error" id="custom-error"></div>
                </div>

                <button id="apply-settings-btn" class="apply-button">应用设置</button>
            </div>

            <!-- 最佳成绩显示 -->
            <div class="best-times-panel">
                <h2>最佳成绩</h2>
                <div class="best-times">
                    <div class="best-time-item">
                        <span class="difficulty-name">简单:</span>
                        <span id="best-easy" class="best-time">--</span>
                    </div>
                    <div class="best-time-item">
                        <span class="difficulty-name">普通:</span>
                        <span id="best-normal" class="best-time">--</span>
                    </div>
                    <div class="best-time-item">
                        <span class="difficulty-name">困难:</span>
                        <span id="best-hard" class="best-time">--</span>
                    </div>
                </div>
            </div>

            <!-- 游戏说明 -->
            <div class="instructions-panel">
                <h2>游戏说明</h2>
                <ul class="instructions-list">
                    <li>使用方向键移动角色</li>
                    <li>找到红色出口获胜</li>
                    <li>可显示最短路径提示</li>
                    <li>挑战更快的通关时间</li>
                </ul>
            </div>

            <!-- 游戏提示 -->
            <div class="tips-panel">
                <h2>游戏技巧</h2>
                <div class="tip-item">
                    <span class="tip-icon">💡</span>
                    <span>沿着墙壁行走是基本策略</span>
                </div>
                <div class="tip-item">
                    <span class="tip-icon">🎯</span>
                    <span>记住走过的路径避免重复</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="main.js"></script>
</body>
</html>
